name: Check JVM versions of the AWS Lambda Java base images

on:
  schedule:
    # Daily at 03:41 UTC (cron on GitHub runs best-effort, not to the second)
    - cron: '41 3 * * *'
  workflow_dispatch: # manual start via the Actions UI

permissions:
  contents: write # to commit the results back

concurrency:
  group: jvm-version-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU for running the arm64 images (java -version under emulation)
      - uses: docker/setup-qemu-action@v3

      - name: Check base images and update website data
        run: python3 scripts/update_versions.py
        env:
          CLEANUP_IMAGES: "1" # keep the runner disk clean

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/versions.json docs/
          if git diff --cached --quiet; then
            echo "No changes - nothing to commit"
          else
            git commit -m "chore: update JVM versions of the Lambda Java base images"
            git push
          fi
